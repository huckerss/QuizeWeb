<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일반 상식 개정판 퀴즈</title>
  <style>
    /* ===== CSS 변수 시스템 (라이트 모드) ===== */
    :root {
      --purple-100: #EEEDFE;
      --purple-200: #D8D5FD;
      --purple-300: #B8B2FB;
      --purple-400: #9A93F0;
      --purple-500: #7F77DD;
      --purple-600: #6B63C8;
      --purple-700: #534AB7;

      --color-bg-page:               #F7F7FB;
      --color-background-primary:    #FFFFFF;
      --color-background-secondary:  #F3F3F6;
      --color-background-tertiary:   #E8E8EE;
      --color-text-primary:          #1A1A2E;
      --color-text-secondary:        #717190;
      --color-text-tertiary:         #A0A0B8;
      --color-border-primary:        #D1D1DC;
      --color-border-secondary:      #E8E8EE;
      --color-border-tertiary:       #F3F3F6;
      --color-accent:                #7F77DD;
      --color-accent-light:          #EEEDFE;
      --color-accent-dark:           #534AB7;
      --color-accent-hover:          #D8D5FD;

      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo',
                   'Noto Sans KR', 'Malgun Gothic', sans-serif;

      --space-1:  4px;  --space-2:  8px;  --space-3: 12px;
      --space-4: 16px;  --space-5: 20px;  --space-6: 24px;
      --space-8: 32px;  --space-10:40px;

      --border-radius-sm:   6px;
      --border-radius-md:  10px;
      --border-radius-lg:  16px;
      --border-radius-xl:  20px;
      --border-radius-full: 9999px;

      --shadow-sm:     0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:     0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg:     0 10px 30px rgba(0,0,0,.10), 0 4px 10px rgba(0,0,0,.05);
      --shadow-accent: 0 4px 14px rgba(127,119,221,.30);

      --transition-fast: .12s ease;
      --transition-base: .20s ease;
      --transition-slow: .35s cubic-bezier(.4,0,.2,1);
    }

    /* ===== 다크 모드 토큰 오버라이드 ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-page:               #0F0F1A;
        --color-background-primary:    #1A1A2E;
        --color-background-secondary:  #252540;
        --color-background-tertiary:   #2E2E4A;
        --color-text-primary:          #E8E8F0;
        --color-text-secondary:        #9090B0;
        --color-text-tertiary:         #606080;
        --color-border-primary:        #3A3A5C;
        --color-border-secondary:      #2E2E4A;
        --color-border-tertiary:       #252540;
        --color-accent:                #9A93F0;
        --color-accent-light:          rgba(127,119,221,.18);
        --color-accent-dark:           #B8B2FB;
        --color-accent-hover:          rgba(127,119,221,.30);
        --shadow-sm:     0 1px 3px rgba(0,0,0,.30);
        --shadow-md:     0 4px 12px rgba(0,0,0,.40);
        --shadow-lg:     0 10px 30px rgba(0,0,0,.50);
        --shadow-accent: 0 4px 14px rgba(127,119,221,.20);
      }
    }

    /* ===== 리셋 & 베이스 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.65;
      min-height: 100dvh;
    }

    button { font-family: inherit; cursor: pointer; }
    button:active:not(:disabled) { transform: scale(.97); }
    input  { font-family: inherit; }

    /* ===== 레이아웃 ===== */
    #app {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 76px;
    }

    /* ===== 헤더 ===== */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }
    .hdr h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -.3px;
    }
    .bdg {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--border-radius-full);
      background: var(--color-accent-light);
      color: var(--color-accent-dark);
      border: 1px solid var(--color-accent);
      letter-spacing: .2px;
      white-space: nowrap;
    }

    /* ===== 진행 바 ===== */
    .prog {
      height: 5px;
      background: var(--color-border-secondary);
      border-radius: var(--border-radius-full);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .prog-f {
      height: 100%;
      background: linear-gradient(90deg, var(--purple-600), var(--purple-400));
      border-radius: var(--border-radius-full);
      transition: width var(--transition-slow);
      position: relative;
      overflow: hidden;
    }
    .prog-f::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      animation: shimmer 2.4s infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    /* ===== 필터 바 (모바일: 가로 스크롤) ===== */
    .fbar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .fbar::-webkit-scrollbar { display: none; }

    .fb {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: var(--border-radius-full);
      border: 1px solid var(--color-border-primary);
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      min-height: 30px;
      transition: background var(--transition-fast), color var(--transition-fast),
                  border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .fb:hover:not(.on) {
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }
    .fb.on {
      background: var(--color-accent-light);
      border-color: var(--color-accent);
      color: var(--color-accent-dark);
      font-weight: 600;
      box-shadow: 0 0 0 2px rgba(127,119,221,.15);
    }

    /* ===== 질문 카드 ===== */
    .card {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      padding: 20px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-md);
      animation: card-enter .25s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .qmeta {
      font-size: 11px;
      color: var(--color-text-tertiary);
      font-weight: 500;
      letter-spacing: .3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .qbadge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: var(--border-radius-full);
      margin-bottom: 10px;
      letter-spacing: .2px;
    }
    .bmc  { background: var(--color-accent-light); color: var(--color-accent-dark); }
    .bsub { background: #E1F5EE; color: #0F6E56; }

    .qtxt {
      font-size: 15px;
      color: var(--color-text-primary);
      line-height: 1.65;
      margin-bottom: 16px;
      word-break: keep-all;
    }

    /* ===== 선택지 버튼 ===== */
    .opts { display: flex; flex-direction: column; gap: 8px; }

    .ob {
      text-align: left;
      padding: 11px 14px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--color-border-primary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 14px;
      cursor: pointer;
      line-height: 1.5;
      width: 100%;
      min-height: 48px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: background var(--transition-fast), border-color var(--transition-fast),
                  box-shadow var(--transition-fast);
    }
    .ob:hover:not(:disabled) {
      background: var(--color-background-tertiary);
      box-shadow: var(--shadow-sm);
    }
    .ob.ok {
      background: #EAF3DE;
      border-color: #639922;
      color: #3B6D11;
      animation: answer-ok .22s ease both;
    }
    .ob.ng {
      background: #FCEBEB;
      border-color: #E24B4A;
      color: #A32D2D;
      animation: answer-ng .22s ease both;
    }
    .ob.dim {
      background: var(--color-background-secondary);
      color: var(--color-text-tertiary);
      border-color: var(--color-border-tertiary);
      opacity: .6;
    }
    @keyframes answer-ok {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
    @keyframes answer-ng {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      60%       { transform: translateX(5px); }
    }

    /* 번호 뱃지 (b 태그) */
    .ob b {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: var(--border-radius-full);
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 1px;
      background: var(--color-background-tertiary);
      color: var(--color-text-secondary);
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    .ob.ok b  { background: rgba(99,153,34,.2);  color: #3B6D11; }
    .ob.ng b  { background: rgba(226,75,74,.2); color: #A32D2D; }
    .ob.dim b { opacity: .5; }

    /* ===== 결과 피드백 ===== */
    .result {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: var(--border-radius-md);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      animation: fade-up .2s ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .res-ok { background: #EAF3DE; border: 1px solid #639922; color: #3B6D11; }
    .res-ng { background: #FCEBEB; border: 1px solid #E24B4A; color: #A32D2D; }

    /* ===== 주관식 입력 ===== */
    .sinput { display: flex; gap: 8px; }

    .si {
      flex: 1;
      padding: 11px 14px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--color-border-primary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 14px;
      min-height: 48px;
      outline: none;
      transition: border-color var(--transition-base), box-shadow var(--transition-base),
                  background var(--transition-base);
    }
    .si::placeholder { color: var(--color-text-tertiary); }
    .si:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(127,119,221,.18);
      background: var(--color-background-primary);
    }

    .sbtn {
      padding: 11px 16px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--color-accent);
      background: var(--color-accent-light);
      color: var(--color-accent-dark);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      white-space: nowrap;
      transition: background var(--transition-fast), box-shadow var(--transition-fast);
    }
    .sbtn:hover:not(:disabled) {
      background: var(--color-accent-hover);
      box-shadow: var(--shadow-accent);
    }
    .sbtn:disabled { opacity: .5; cursor: default; }

    /* ===== 네비게이션 (모바일: sticky bottom) ===== */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: sticky;
      bottom: 0;
      background: var(--color-bg-page);
      margin: 0 -16px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--color-border-secondary);
      z-index: 10;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .nb {
      padding: 10px 18px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--color-border-primary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      min-width: 84px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition-fast), box-shadow var(--transition-fast),
                  transform var(--transition-fast), border-color var(--transition-fast);
    }
    .nb:hover:not(:disabled) {
      background: var(--color-background-tertiary);
      box-shadow: var(--shadow-sm);
    }
    .nb:disabled { opacity: .35; cursor: default; }

    .ninfo {
      font-size: 12px;
      color: var(--color-text-secondary);
      font-weight: 500;
      text-align: center;
      flex: 1;
    }

    /* ===== 결과 화면 ===== */
    .scard {
      text-align: center;
      padding: 44px 24px;
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-xl);
      box-shadow: var(--shadow-lg);
      animation: card-enter .3s cubic-bezier(.4,0,.2,1) both;
    }
    .snum {
      font-size: 54px;
      font-weight: 800;
      color: var(--color-accent-dark);
      margin: 16px 0;
      letter-spacing: -1px;
      line-height: 1;
    }
    .rbtn {
      display: inline-flex;
      align-items: center;
      padding: 7px 18px;
      border-radius: var(--border-radius-full);
      border: 1px solid var(--color-accent);
      background: var(--color-accent-light);
      color: var(--color-accent-dark);
      font-size: 13px;
      font-weight: 600;
      margin: 4px;
      cursor: pointer;
      min-height: 34px;
      transition: background var(--transition-fast), box-shadow var(--transition-fast),
                  transform var(--transition-fast);
    }
    .rbtn:hover {
      background: var(--color-accent-hover);
      box-shadow: var(--shadow-accent);
      transform: translateY(-1px);
    }

    /* ===== 데스크탑 (768px 이상) ===== */
    @media (min-width: 768px) {
      #app { padding: 36px 28px 36px; }

      .hdr h2 { font-size: 20px; }
      .bdg    { font-size: 12px; padding: 4px 12px; }

      .prog { height: 6px; margin-bottom: 16px; }

      .fbar {
        flex-wrap: wrap;
        overflow: visible;
        margin-bottom: 16px;
      }
      .fb { font-size: 13px; padding: 5px 14px; }

      .card {
        padding: 28px 28px;
        border-radius: var(--border-radius-xl);
        box-shadow: var(--shadow-lg);
      }
      .qtxt { font-size: 16px; }

      .ob {
        font-size: 15px;
        padding: 12px 16px;
        min-height: 44px;
        border-radius: var(--border-radius-lg);
      }
      .ob b { min-width: 24px; height: 24px; font-size: 13px; }

      /* 데스크탑에선 sticky 해제 */
      .nav {
        position: static;
        background: transparent;
        border-top: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        margin: 0;
        padding: 16px 0 0;
      }

      .nb {
        min-height: 40px;
        padding: 9px 22px;
        border-radius: var(--border-radius-lg);
      }
      .nb:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .snum { font-size: 62px; }
      .rbtn { font-size: 14px; padding: 8px 22px; min-height: 38px; }
    }

    /* ===== 다크 모드 컴포넌트 오버라이드 ===== */
    @media (prefers-color-scheme: dark) {
      .ob.ok  { background: #1A3A1A; border-color: #639922; color: #7DC75A; }
      .ob.ng  { background: #3A1A1A; border-color: #E24B4A; color: #F07070; }
      .ob.ok b { background: rgba(99,153,34,.25); color: #7DC75A; }
      .ob.ng b { background: rgba(226,75,74,.25); color: #F07070; }
      .res-ok { background: #1A3A1A; border-color: #639922; color: #7DC75A; }
      .res-ng { background: #3A1A1A; border-color: #E24B4A; color: #F07070; }
      .bsub   { background: rgba(15,110,86,.25); color: #5DD6A0; }
    }

    /* ===== 모션 감소 설정 ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }

    /* ===== 메인 페이지 (origin/main에서 병합) ===== */
    .mp { text-align: center; padding: 2.5rem 1rem; }
    .mp-title { font-size: 26px; font-weight: 700; color: var(--color-accent-dark); margin-bottom: .4rem; }
    .mp-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.8rem; }
    .mp-cats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
    .mp-cat {
      padding: 1.2rem 1rem;
      border-radius: var(--border-radius-lg);
      border: 1px solid var(--color-border-secondary);
      background: var(--color-background-primary);
      cursor: pointer;
      text-align: left;
      transition: border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
    }
    .mp-cat:hover { border-color: var(--color-accent); background: var(--color-accent-light); box-shadow: var(--shadow-sm); }
    .mp-cat-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: .3rem; }
    .mp-cat-cnt  { font-size: 12px; color: var(--color-text-tertiary); }
    .mp-start {
      padding: 10px 28px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--color-accent);
      background: var(--color-accent-dark);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: .6rem;
      transition: background var(--transition-fast), box-shadow var(--transition-fast);
    }
    .mp-start:hover { background: var(--color-accent); box-shadow: var(--shadow-accent); }
    .mp-fbtns { display: flex; gap: 8px; justify-content: center; margin-top: .5rem; }
    .mp-fb {
      padding: 7px 16px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--color-border-primary);
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    }
    .mp-fb:hover { background: var(--color-accent-light); color: var(--color-accent-dark); border-color: var(--color-accent); }
    .hdr h2 { cursor: pointer; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const Q=[
/* ===== 1. 정치·경제 MC ===== */
{s:"정치·경제",t:"mc",q:"다음 중 브레인스토밍에 대한 설명으로 틀린 것은?",o:["창의적인 아이디어를 생산하기 위한 집단 발상 기법","다른 사람의 아이디어를 비판하지 않는다","아이디어의 양보다 질을 중요시한다","광고의 카피 부문이나 크리에이티브 부문의 아이디어 개발에 많이 적용된다"],a:2},

{s:"정치·경제",t:"sub",q:"IMF(International Monetary Fund)란?",a:"국제통화기금. 경제 발전과 세계 무역 촉진을 위해 설립된 국제 기구로 회원국들의 금융 안정과 국제적인 통화 협력 촉진, 국가 간 자유 무역의 확대, 고용 및 지속 가능한 경제 성장의 촉진을 목적으로 하는 국제금융기구로 1944년 브레튼우즈 협정에 의해 발족됨."},
{s:"정치·경제",t:"sub",q:"게리맨더링(Gerrymandering)이란?",a:"선거구를 특정 정당이나 개인에게 유리하도록 인위적으로 확정하는 것."},
{s:"정치·경제",t:"sub",q:"오픈프라이머리(Open Primary)이란?",a:"개방형 예비선거, 완전국민경선제. 정당의 선거 후보를 정하는 예비 선거에 참가할 수 있는 자격을 당원으로 제한하지 않고 누구에게나 개방하는 선거 방식. 투표자들은 정당의 성향을 밝히지 않고 특정 정당의 예비 선거에 투표할 수 있다. 오픈 프라이머리의 반대는 클로즈드 프라이머리(Closed Primary)로, 예비 선거에서 해당 정당에 등록된 당원만 투표할 수 있다."},
{s:"정치·경제",t:"sub",q:"자신이 거주하는 지역 주변에 산업폐기물 처리시설 등의 환경시설이나 장애인 등 특수한 시설의 설치를 반대하는 지역이기주의 현상은 무엇인가?",a:"님비 현상 (NIMBY)"},
{s:"정치·경제",t:"sub",q:"세컨더리보이콧(Secondary Boycott)이란?",a:"2차 보이콧, 2차 제재. 제재를 가하는 당사국뿐만 아니라 그 나라와 교류하는 국가의 개인이나 기업, 금융 기관까지 제재하는 것을 말함."},
{s:"정치·경제",t:"sub",q:"관세 및 무역에 관한 일반협정(GATT)를 흡수 통합하여 1995년에 설립된 국제기구로 각국의 무역장벽을 낮추어 국제무역 확대 및 통상분쟁 해결 등 세계무역 및 통상관계 전반을 관장하는 기구는?",a:"세계무역기구 (WTO)"},
{s:"정치·경제",t:"sub",q:"기업의 외적 성장을 위한 발전전략으로 특정 기업이 다른 기업의 경영권을 인수할 목적으로 소유지분을 확보하는 것을 무엇이라고 하는가?",a:"기업인수합병 (M&A)"},
{s:"정치·경제",t:"sub",q:"수입 할당제(Quota), 수출자율규제, 긴급수입제한조치(Safeguard), 수출보조금 지급, 기술 수준이나 규격에 대한 허가 제한, 행정적 규제 등 관세 이외의 실질적인 수입제한 방법을 무엇이라 하는가?",a:"비관세장벽 (Non-tariff barriers)"},
{s:"정치·경제",t:"sub",q:"한 국가의 경제력이나 생활수준을 알아보기 위해 사용하는 대표적인 경제 지표 중 하나로 국내에 거주하는 모든 사람들이 일정기간 동안 생산한 부가가치의 총액은?",a:"국내총생산 (GDP)"},
{s:"정치·경제",t:"sub",q:"주택은 있으나 특별한 소득원이 없는 경우, 고령자가 보유하고 있는 주택을 담보로 금융기관에서 매월 연금 형태로 지급하고, 사망하면 금융기관이 주택을 처분하여 그 동안의 대출금과 이자를 상환하는 방식을 무엇이라고 하는가?",a:"역모기지론"},

{s:"교육·의료·복지",t:"mc",q:"흡수 통일 포기, 교류·협력에 있어서 정경 분리 원칙의 적용, 평화 정착 우선주의의 채택을 내용으로 하는 김대중 정부의 대북 포용 정책을 가리켜 무엇이라고 하는가?",o:["동방정책","대북강경정책","햇볕정책","대북안보정책"],a:2},
{s:"교육·의료·복지",t:"mc",q:"라틴어로 '지체하다'란 뜻에서 온 말로 전쟁, 경제 공황, 화폐 개혁 등 긴급 사태가 발생한 경우 국가 권력이 일정 기간 채무를 지불 유예하는 것을 말하는 것은?",o:["모럴 해저드","모라토리엄","워크아웃","법정관리"],a:1},

{s:"교육·의료·복지",t:"mc",q:"철새, 닭, 오리 등 조류에 감염되는 바이러스로 전파속도가 매우 빠르고 사람에게도 감염을 일으킬 수 있는 인수공통 감염병을 무엇이라고 하는가?",o:["구제역","광우병","브루셀라병","조류인플루엔자"],a:3},
{s:"교육·의료·복지",t:"mc",q:"대중영합주의 혹은 민중주의라고 하는 것으로 정치적 투쟁에 대중을 앞세워 권력을 유지하는 정치 체제를 말합니다. 엘리트주의와 반대되는 개념은?",o:["포퓰리즘","관료주의","국가통제주의","주민투표"],a:0},
{s:"교육·의료·복지",t:"mc",q:"2009년 나카모토 사토시가 만든 디지털 통화로, 각국의 중앙은행이 화폐발행을 독점하고 자의적인 통화정책을 펴는 것에 대한 반발로 탄생한 사이버머니를 가리켜 무엇이라고 하는가?",o:["헬로우포인트","마일리지","비트코인","다음 캐시"],a:2},
{s:"교육·의료·복지",t:"mc",q:"2015년 3월 27일 제정·공포된 '부정청탁 및 금품 수수의 금지에 관한 법률'을 제안자의 이름을 따 부르는 말로, 2004년 8월 25일 대한민국 최초 여성 대법관으로 임용된 사람의 이름을 딴 법은?",o:["도가니법","신해철법","김영란법","예강이법"],a:2},
{s:"교육·의료·복지",t:"mc",q:"대한민국과 중국 사이의 배타적 경제 수역 설정을 둘러싼 갈등의 중심에 있는 곳으로 중국말로 '쑤옌자오'라 불려지는 암초로 마라도 서남쪽에 있는 곳은 어디인가요?",o:["독도","대마도","이어도","센카쿠 열도"],a:2},
{s:"교육·의료·복지",t:"mc",q:"비정부기구 또는 비정부단체로서 정부기관이나 관련 단체가 아닌 순수한 민간 조직이다. 특정 국가에 속하지 않는 전지구적 문제에 관심을 갖는 민간 조직을 말하며, 1945년 국제연합의 설립과 함께 주목을 받기 시작한 단체는?",o:["NGO","국제노동기구","세계보건기구","UN"],a:0},

{s:"교육·의료·복지",t:"sub",q:"무선 데이터 전송 시스템(wireless fidelity)의 줄임말이다. 1985년 미국 연방통신위원회가 허가 없이도 사용할 수 있는 무선 주파수를 배포하기로 결정하면서 출발했다. 전용선이나 전화선이 없이 근거리통신망을 가동시킬 수 있어 가정 및 사업장 네트워크 시스템으로 많이 선택되었으며 노트북과 휴대전화, 개인용 휴대 정보 단말기(PDA), 전자 게임기 등 많은 장치들에 무선 광대역 인터넷 접속을 가능하게 해주는 것을 가리켜 무엇이라고 부르는가?",a:"와이파이 (Wi-Fi)"},
{s:"교육·의료·복지",t:"sub",q:"우리나라 최초의 다목적 실용 위성. 정밀 지도 제작, 지리 정보 시스템(GIS), 국토 관리, 재해 예방(기상 예측, 환경오염, 수해, 산불 감시, 조난 구조 등)에 사용되는 위성은?",a:"아리랑 위성"},
{s:"교육·의료·복지",t:"sub",q:"여러 대의 컴퓨터가 특정 사이트를 마비시키려고 한꺼번에 공격을 가하는 해킹 수법. 특정 컴퓨터의 자료를 훔치거나 삭제하기보다는 정당한 신호를 받지 못하도록 방해하는 분산서비스를 거부하는 데 있다. 해당 컴퓨터의 기능을 마비시키기 위해 동시에 여러 대의 컴퓨터가 공격을 가해 대량 접속을 일으키는 것을 무엇이라고 하나?",a:"디도스 (DDoS)"},
{s:"교육·의료·복지",t:"sub",q:"지진이나 화산 분출이 때로는 대양을 가로질러 전파되는 거대한 파도를 만들기도 한다. 이런 파도는 지진이나 화산 분출보다 더 큰 피해를 발생시키는 경우가 많은데 이 지진 해일을 가리켜 부르는 말은?",a:"쓰나미"},
{s:"교육·의료·복지",t:"sub",q:"소, 돼지, 염소, 양 등 발굽이 2개로 갈라진 동물에게 발생하는 가축 전염병. 치사율이 5~55%이며 치료법이 없어 백신을 통한 예방이 최우선책이다. 증상으로는 고열과 함께 거품 섞인 침을 흘리고, 입 안에 염증이 생기며 발굽 주변에 물집이 생긴다. 이 가축 전염병을 무엇이라고 부르는가?",a:"구제역"},
{s:"교육·의료·복지",t:"sub",q:"일정 금액 이상의 임금을 근로자에게 지불하도록 법적으로 강제하는 제도이다. 기대 효과는 임금률을 높이고, 임금 생활자의 소득을 증가시키며, 수준 이하의 노동 조건이나 빈곤을 없애고, 임금 생활자의 노동력 착취를 방지하며, 소득 재분배를 실현하는 데 있다. 이것을 가리켜 부르는 말은?",a:"최저임금제"},
{s:"교육·의료·복지",t:"sub",q:"국가 연금의 하나로서, 노무현 참여 정부가 노인 복지와 삶의 질 향상을 위해 제정하였으며, 일정 나이 이상의 노인들에게 매월 지급되는 복지 급여이다. 이 노인 연금을 무엇이라 부르는가?",a:"기초노령연금"},
{s:"교육·의료·복지",t:"sub",q:"휴대전화와 같은 디지털 기기에 지나치게 의존한 나머지 손으로 글을 쓰는 것이 어색해지고 기억력과 계산 능력이 크게 떨어진 상태를 말하는 용어는?",a:"디지털치매"},
{s:"교육·의료·복지",t:"sub",q:"여성이 직장에서 승진하는 데 장애가 되어 성공을 가로막는 장애물을 가리키는 말로서 1970년대에 미국의 한 경제 일간지에서 미국 여성이 직장에서 승진하는데 보이지 않는 차별을 당한다는 점을 강조하기 위해 처음으로 사용되었다. 무슨 용어인가?",a:"유리천장"},
{s:"교육·의료·복지",t:"sub",q:"초등학교나 유치원 정문에서 반경 300m 이내에 지정된 어린이 보호 구역으로 도로교통법에 의해 1995년 도입됐으며 각 지방자치단체에서는 어린이를 교통사고의 위험으로부터 보호하기 위해 초등학교 및 유치원 정문에서 반경 300m 이내의 주 통학로를 보호 구역으로 지정해야 하는 이 지역을 가리켜 부르는 말은?",a:"스쿨존 (School Zone)"},
{s:"교육·의료·복지",t:"sub",q:"성 소수자가 스스로 자신의 성 정체성을 드러내는 것을 말한다. 주로, 게이, 레즈비언, 양성애자라고 밝히는 것을 뜻한다. 자신의 사상이나 지향성 등을 공개적으로 밝히는 행위라는 뜻으로 확장되어 쓰이기도 한다. '벽장 밖으로 나오다(coming out the closet)'라는 어구에서 유래된 말은?",a:"커밍아웃 (Coming Out)"},
{s:"교육·의료·복지",t:"sub",q:"기술(technology)과 도시(polis)의 합성어로 이 용어는 일본에서 처음 쓰이기 시작했고, 연구소·대학·첨단산업공장과 함께 배후 도시가 포함된 복합적인 단지 또는 도시를 일컫는 말은?",a:"테크노폴리스 (Technopolis)"},

{s:"법률·언론·문화",t:"sub",q:"만 20세 이상의 국민 중 무작위로 선정된 배심원이 참여하는 형사재판으로 우리나라에서 2008년 1월부터 시행된 배심원 재판제도를 가리켜 무엇이라고 하는가?",a:"국민참여재판"},
{s:"법률·언론·문화",t:"sub",q:"\"당신은 묵비권을 행사할 수 있고, 변호인을 선임할 권리가 있습니다. 당신의 모든 발언은 법정에서 불리하게 작용할 수 있습니다.\" 수사기관이 범죄 용의자를 체포할 때 체포의 이유와 변호를 받을 수 있는 권리, 진술을 거부할 수 있는 권리 등이 있음을 미리 알려주어야 한다는 원칙을 가리켜 무엇이라고 하는가?",a:"미란다원칙"},
{s:"법률·언론·문화",t:"sub",q:"모든 국민은 법률이 제정되기 전에 발생한 사실에 대해 소급해서 적용되지 않는다는 원칙은 무엇인가?",a:"법률불소급의 원칙"},
{s:"법률·언론·문화",t:"sub",q:"법률과 동일한 효력을 갖는 관습. 입법 기관에 의해 정립된 것은 아니지만, 사회생활에 있어서의 습관이나 관행이 법적 확신을 가져 법으로서 인정된 것을 말하는 것은?",a:"관습법"},
{s:"법률·언론·문화",t:"sub",q:"국가의 기본 법칙으로서, 국민의 기본적 인권을 보장하고 국가의 정치 조직 구성과 정치 작용 원칙을 정하고 시민과 국가의 관계를 규정하거나 형성하는 최고의 규범은?",a:"헌법"},
{s:"법률·언론·문화",t:"sub",q:"제6공화국 헌법에서 헌정 사항 처음으로 채택된 것으로 공권력의 행사 또는 불행사로 인해 기본권을 침해받은 자가 직접 헌법재판소에 그 권리를 구제해주도록 청구하는 제도입니다. 국가 공권력의 남용 또는 오용으로부터 헌법상 보장된 국민의 자유와 권리를 보호하는 헌법재판제도는 무엇인가요?",a:"헌법소원"},
{s:"법률·언론·문화",t:"sub",q:"대한민국 법령의 위헌 여부 및 분쟁 심판 등을 관장하는 기관. 법원의 제청에 의한 법률의 위헌 여부 심판, 탄핵 심판, 정당 해산 심판, 단체 간 권한 쟁의에 관한 심판, 헌법 소원에 대한 심판 등의 심판을 주로 담당하는 곳으로 9명의 재판관으로 구성된 곳은?",a:"헌법재판소"},
{s:"법률·언론·문화",t:"sub",q:"형사소송법 제244조의 3에 피고인 또는 피의자가 수사기관의 조사나 공판 절차 등에서 시종 침묵하거나 또는 개개의 질문에 대하여 답을 거부할 수 있는 권리는?",a:"묵비권"},
{s:"법률·언론·문화",t:"sub",q:"자기의 권리를 보호하거나 실현하기 위하여 국가의 힘을 빌리지 않고 실력을 행사하는 행위를 가리켜 무엇이라고 하는가?",a:"자력구제제도"},
{s:"법률·언론·문화",t:"sub",q:"부동산 거래 시 양도소득세를 줄이기 위해 계약서에 실제 거래 가격보다 낮은 가격을 적는 이중계약을 말하는 것은?",a:"다운계약서"},
{s:"법률·언론·문화",t:"sub",q:"상속인이 법률상 반드시 취득하도록 보장되어있는 상속 재산의 가액을 말하며 유언자의 의사만으로 재산을 자유롭게 처분할 경우, 남은 가족의 생활 안정을 해칠 우려가 있기 때문에 법으로 최소한의 상속분을 정하는 제도로 유언보다 우선하는 것은?",a:"유류분"},
{s:"법률·언론·문화",t:"sub",q:"징역 또는 금고의 집행 중에 있는 자가 개전(改悛)의 정(情)이 현저한 때에 형기 만료 전에 조건부로 석방하는 제도는?",a:"가석방"},
{s:"법률·언론·문화",t:"sub",q:"행위자가 범죄 사실의 발생을 적극적으로 의도하지 않았지만, 자신의 행위가 어떤 범죄 결과의 발생 가능성이 있음을 알면서도 그 행위를 하는 의식을 가리켜 무엇이라고 말하는가?",a:"미필적고의 (未畢的故意)"},
{s:"법률·언론·문화",t:"sub",q:"국가 보안법을 위반한 자를 알고 있으면서도 고의로 수사 기관이나 정보 기관에 알리지 않는 경우 처벌되는 죄를 가리켜 무엇이라고 하는가?",a:"불고지죄 (不告知罪)"},
{s:"법률·언론·문화",t:"sub",q:"누구든지 체포·구속을 당했을 때 그 적부의 심사를 법원에 청구할 수 있는 권리이다. 우리나라는 1948년 제헌 헌법 이래 헌법상의 기본권으로 규정하고 있는 것은?",a:"구속적부심"},
{s:"법률·언론·문화",t:"sub",q:"경미한 형사 사건에 대하여 경찰서장의 서면 청구가 있을 경우 순회판사(巡廻判事)가 즉시 심판하는 절차로 20만원 이하의 벌금 또는 구류나 과료(科料)에 처할 범죄 사건을 심판하게 되어 있는 것은?",a:"즉결심판"},
{s:"법률·언론·문화",t:"sub",q:"'국가에 무상으로 재산을 준다'는 뜻으로, 국가나 지자체가 무상으로 재산을 받아들이는 것을 말한다. 사업 시행자의 경우 공공 시설물 등의 기부를 통해 국가나 지자체로부터 용적률 상향 등의 인센티브를 제공받게 되는 것은?",a:"기부채납"},
{s:"법률·언론·문화",t:"sub",q:"매스미디어에 공표된 내용에 의해 피해를 입은 자가 반론 보도를 청구할 수 있는 권리 액세스권의 한 유형으로 신문·잡지·방송 등 언론 보도에 의해 명예훼손을 당한 사람이 해당 언론에게 반박문이나 정정문을 게재 또는 방송할 것을 요구할 수 있는 권리는?",a:"반론권"},
{s:"법률·언론·문화",t:"sub",q:"뉴스의 보도를 일정 시간 미루는 것. 국제 관계에서는 특정 국가에 대해 무역·교류를 금하는 것을 뜻하지만, 언론에서는 뉴스 기사의 보도를 일정 시간까지 유보하는 것을 말한다. 즉, 기사의 정보제공자가 뉴스 자료를 제보할 때 일정 시간까지는 해당 내용을 공개하지 말 것을 요구하면 그 시기까지 보도를 미루는 것은?",a:"엠바고"},
{s:"법률·언론·문화",t:"sub",q:"방송의 공공성과 건전한 통신 문화를 조성하기 위해 설립된 민간독립기구로 대통령이 9명의 심의 위원을 위촉한다. 이들의 임기는 3년이고, 1회에 한해 연임할 수 있다. 주요 업무는 방송의 공정성을 유지하기 위한 심의·의결 및 심의 규정 위반에 대한 제재 사항의 심의·결정, 부적절한 방송 내용에 대한 권고·주의 및 시정 명령, 금지 가요에 대한 심의 결정 등이다. 이 곳은 어떤 곳인가?",a:"방송통신심의위원회"},
{s:"법률·언론·문화",t:"sub",q:"텔레비전에서 특정 프로그램이 시청되고 있는 정도를 나타내는 수치. TV 수상기를 보유 중인 가구에서 특정 시간 동안 특정 프로그램을 보는 가구나 개인을 백분율(%)로 표시한 것은?",a:"시청률"},
{s:"법률·언론·문화",t:"sub",q:"드라마·오락·스포츠뿐만 아니라 뉴스 보도까지도 포함해 모든 장르를 방송할 수 있는 채널은? 미디어법이 2009년 국회에서 통과됨에 따라 대기업과 신문사가 종합편성채널의 지분을 30%까지 소유할 수 있게 되면서 도입되었다.",a:"종합편성채널"},
{s:"법률·언론·문화",t:"sub",q:"SF 작가였던 론 허버드가 창립한 것으로 과학기술이 인간의 정신 확장 및 문제를 해결할 수 있다고 주장하는 종교를 가리켜 무엇이라고 하는가?",a:"사이언톨로지 (Scientology)"},
{s:"법률·언론·문화",t:"sub",q:"한국에서는 1992년 한경직 목사가 이 상을 받은 바 있는 것으로 과학과 종교 간 이해 증진을 위해서 제정된 종교계의 노벨상을 가리켜 무엇이라고 하는가?",a:"템플턴상"},
{s:"법률·언론·문화",t:"sub",q:"정치에 있어서 수단과 방법을 가리지 말아야 한다는 마키아벨리의 저서는 무엇인가요?",a:"군주론"},
{s:"법률·언론·문화",t:"sub",q:"신대륙으로 건너가 미국의 기초를 닦은 16~17세기 영국의 칼뱅주의 신교도인 청교도를 대표하는 존 밀턴의 장편 서사시는 무엇인가요?",a:"실락원"},
{s:"법률·언론·문화",t:"sub",q:"유명 배우 혹은 저명 인사가 예기치 않은 장면에 단역으로 출연하여 잠깐 동안 펼치는 연기나 그 역할. 특별 출연 혹은 우정 출연이 이에 해당한다. 영화 전개에 큰 상관 없는 장면에 잠깐 얼굴을 비치는 것을 말하는 것은?",a:"카메오"},
{s:"법률·언론·문화",t:"sub",q:"언어예술·시각예술·음악예술이 이상적으로 혼합된 종합 예술이다. 유명한 작품으로는 모차르트의 <피가로의 결혼>, 로시니의 <세비야의 이발사>, 베버의 <마탄의 사수>, 베르디의 <오텔로>, 바그너의 <니벨룽겐의 반지> 등 수많은 작품들이 있다. 이것을 무엇이라고 하는가?",a:"오페라"},
{s:"법률·언론·문화",t:"sub",q:"한 사람의 창자(唱者)가 한 고수(鼓手)의 북장단에 맞추어 긴 서사적인 이야기를 소리(唱, 노래)와 아니리(曰, 말)로 엮어 발림(몸짓)을 곁들이며 구연(口演)하는 창악적 구비서사시(口碑敍事詩). 전통적으로 광대라고 불려진 하층계급의 예능인들에 의하여 가창·전승되어 왔다. 이것은?",a:"판소리"},
{s:"법률·언론·문화",t:"sub",q:"2년마다 개최되는 국제적 미술전람회. '2년마다'라는 뜻의 이탈리아어로, 주기적으로 열리는 국제 미술전시회를 말한다. 우리나라에서는 1995년에 광주에서 최초로 시작되었는데 이것은?",a:"비엔날레 (Biennale)"},
{s:"법률·언론·문화",t:"sub",q:"역사, 예술 학문적으로 뛰어난 보편적·세계적 가치를 가지고 있는 인류의 소중한 문화유산을 보호하기 위해 유네스코 세계유산위원회가 지정하는 것은?",a:"세계문화유산"},
];

const CATS=['all','mc','sub','정치·경제','교육·의료·복지','사회·노동·역사','법률·언론·문화'];
const CL={all:'전체',mc:'객관식',sub:'주관식','정치·경제':'정치·경제','교육·의료·복지':'교육·의료·복지','사회·노동·역사':'사회·노동·역사','법률·언론·문화':'법률·언론·문화'};
let S={page:'main',f:'all',qs:[],i:0,ans:{},rev:{},done:false};
function filtered(){if(S.f==='all')return Q;if(S.f==='mc')return Q.filter(x=>x.t==='mc');if(S.f==='sub')return Q.filter(x=>x.t==='sub');return Q.filter(x=>x.s===S.f);}
function start(f){S={page:'quiz',f,qs:null,i:0,ans:{},rev:{},done:false};S.qs=filtered();render();}
function goMain(){S={page:'main',f:'all',qs:[],i:0,ans:{},rev:{},done:false};render();}
function score(){return S.qs.filter((q,i)=>q.t==='mc'&&S.ans[i]===q.a).length;}
function render(){
  const app=document.getElementById('app');
  if(S.page==='main'){
    const mc=Q.filter(x=>x.t==='mc').length,sb=Q.filter(x=>x.t==='sub').length;
    const subjects=['정치·경제','교육·의료·복지','사회·노동·역사','법률·언론·문화'];
    const catCards=subjects.map(s=>{const n=Q.filter(x=>x.s===s).length;return`<button class="mp-cat" onclick="start('${s}')"><div class="mp-cat-name">${s}</div><div class="mp-cat-cnt">${n}문항</div></button>`;}).join('');
    app.innerHTML=`<div class="mp"><div class="mp-title">장로고시 지침서 (퀴즈)</div><div class="mp-sub">총 ${Q.length}문항 · 객관식 ${mc} · 주관식 ${sb}</div><div class="mp-cats">${catCards}</div><button class="mp-start" onclick="start('all')">전체 문제 풀기</button><div class="mp-fbtns"><button class="mp-fb" onclick="start('mc')">객관식만</button><button class="mp-fb" onclick="start('sub')">주관식만</button></div></div>`;
    return;
  }
  if(S.done){
    const mc=S.qs.filter(q=>q.t==='mc').length,sb=S.qs.filter(q=>q.t==='sub').length;
    app.innerHTML=`<div class="scard"><div style="font-size:15px;color:var(--color-text-secondary)">퀴즈 완료!</div><div class="snum">${score()}<span style="font-size:22px;color:var(--color-text-secondary)">/${mc}</span></div><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem">객관식 정답 · 주관식 ${sb}문항 자가채점</div><button class="rbtn" onclick="goMain()" style="background:#534AB7;color:#fff;border-color:#534AB7;margin-bottom:.5rem">메인으로</button><br>${CATS.map(f=>`<button class="rbtn" onclick="start('${f}')">${CL[f]} 다시풀기</button>`).join('')}</div>`;
    return;
  }
  const q=S.qs[S.i],tot=S.qs.length,prog=Math.round(S.i/tot*100);
  const done=S.ans[S.i]!==undefined||S.rev[S.i];
  const fbar=CATS.map(f=>`<button class="fb${S.f===f?' on':''}" onclick="start('${f}')">${CL[f]}</button>`).join('');
  let body='';
  if(q.t==='mc'){
    body='<div class="opts">'+q.o.map((o,j)=>{let c='ob';if(done){if(j===q.a)c+=' ok';else if(S.ans[S.i]===j)c+=' ng';else c+=' dim';}return`<button class="${c}" onclick="pick(${j})" ${done?'disabled':''}><b>${['①','②','③','④'][j]}</b>${o}</button>`;}).join('')+'</div>';
    if(done){const ok=S.ans[S.i]===q.a;body+=`<div class="result ${ok?'res-ok':'res-ng'}">${ok?'정답입니다! ✓':'오답 — 정답: '+q.o[q.a]}</div>`;}
  }else{
    body=`<div class="sinput"><input class="si" id="si" type="text" placeholder="답을 입력하세요..." ${S.rev[S.i]?'disabled':''} onkeydown="if(event.key==='Enter')reveal()"><button class="sbtn" onclick="reveal()" ${S.rev[S.i]?'disabled':''}>확인</button></div>`;
    if(S.rev[S.i])body+=`<div class="result res-ok" style="margin-top:.7rem"><b style="font-weight:500">모범 답안:</b> ${q.a}</div>`;
  }
  const mcn=S.qs.filter(x=>x.t==='mc').length;
  app.innerHTML=`<div class="hdr"><h2 onclick="goMain()">장로고시 지침서</h2><span class="bdg">${S.i+1} / ${tot}</span></div><div class="prog"><div class="prog-f" style="width:${prog}%"></div></div><div class="fbar">${fbar}</div><div class="card"><div class="qmeta">${q.s} · Q${S.i+1}</div><span class="qbadge ${q.t==='mc'?'bmc':'bsub'}">${q.t==='mc'?'객관식':'주관식'}</span><div class="qtxt">${q.q}</div>${body}</div><div class="nav"><button class="nb" onclick="mv(-1)" ${S.i===0?'disabled':''}>← 이전</button><span class="ninfo">${mcn>0?`객관식 ${score()}/${mcn} 정답`:'주관식'}</span>${S.i===tot-1?`<button class="nb" onclick="S.done=true;render()">결과 보기 →</button>`:`<button class="nb" onclick="mv(1)" ${!done?'disabled':''}>다음 →</button>`}</div>`;
  if(q.t==='sub'&&!S.rev[S.i])setTimeout(()=>{const e=document.getElementById('si');if(e)e.focus();},40);
}
function pick(j){if(S.ans[S.i]!==undefined)return;S.ans[S.i]=j;render();}
function reveal(){if(S.rev[S.i])return;const e=document.getElementById('si');S.ans[S.i]=e?e.value:'';S.rev[S.i]=true;render();}
function mv(d){S.i=Math.max(0,Math.min(S.qs.length-1,S.i+d));render();}
render();
</script>
</body>
</html>
